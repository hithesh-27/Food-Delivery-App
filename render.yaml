# Render Blueprint: https://render.com/docs/blueprint-spec
# After push, open the Render dashboard and use the live *.onrender.com URL shown there
# (old URLs like food-del-frontend-kq6b stop working if the service was deleted or recreated).

services:
  # Vite/React SPA — use runtime: static (not a Node web server).
  - type: web
    name: food-del-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        value: https://food-del-backend-2-tho7.onrender.com

  # Optional: Streamlit + embedded React (Docker).
  - type: web
    name: food-del-streamlit
    runtime: docker
    dockerfilePath: ./Dockerfile.streamlit
    dockerContext: .
    envVars:
      - key: BACKEND_URL
        value: https://food-del-backend-2-tho7.onrender.com
