services:
  - type: static_site
    name: food-del-frontend
    env: static
    root: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      - path: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        value: https://food-del-backend-2-tho7.onrender.com
